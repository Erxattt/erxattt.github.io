              <div class="markdown-body">
                
                <h3 id="基本函数"><a href="#基本函数" class="headerlink" title="基本函数"></a>基本函数</h3><figure class="highlight sql"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br></pre></td><td class="code"><pre><code class="hljs sql"><span class="hljs-comment">-- 绝对值</span><br><span class="hljs-keyword">SELECT</span> <span class="hljs-built_in">ABS</span>(<span class="hljs-number">-1</span>);<br><br><span class="hljs-comment">-- 取符号 正数为1 负数为-1</span><br><span class="hljs-keyword">SELECT</span> SIGN(<span class="hljs-number">-2</span>),SIGN(<span class="hljs-number">2</span>); <br><br><span class="hljs-comment">-- 圆周率 小数后6位</span><br><span class="hljs-keyword">SELECT</span> PI();  <br><br><span class="hljs-comment">-- 天花板 &amp;&amp; 地板(向上取整或向下取整) 33 32</span><br><span class="hljs-keyword">SELECT</span> <span class="hljs-built_in">CEIL</span>(<span class="hljs-number">32.22</span>),<span class="hljs-built_in">FLOOR</span>(<span class="hljs-number">32.22</span>);<br><br><span class="hljs-comment">-- 取余</span><br><span class="hljs-keyword">SELECT</span> <span class="hljs-built_in">MOD</span>(<span class="hljs-number">13</span>,<span class="hljs-number">5</span>);<br><br><span class="hljs-comment">-- 随机数 0-1 随机的一个数</span><br><span class="hljs-keyword">SELECT</span> RAND();<br><br><span class="hljs-comment">-- 有参数 且相同的参数出来的值是一样的 </span><br><span class="hljs-keyword">SELECT</span> RAND(<span class="hljs-number">10</span>);<br><br><span class="hljs-comment">-- 四舍五入 3 123.5 参数为保留几个小数</span><br><span class="hljs-keyword">SELECT</span> ROUND(<span class="hljs-number">3.2</span>), ROUND(<span class="hljs-number">123.46</span>,<span class="hljs-number">1</span>);<br><br><span class="hljs-comment">-- 截断函数 保留几个小数 123.2</span><br><span class="hljs-keyword">SELECT</span> <span class="hljs-keyword">TRUNCATE</span>(<span class="hljs-number">123.253</span>,<span class="hljs-number">1</span>);<br><br><span class="hljs-comment">-- 进制转换 10的二进制 和 16进制 </span><br><span class="hljs-keyword">SELECT</span> BIN(<span class="hljs-number">10</span>),HEX(<span class="hljs-number">10</span>); <br><br></code></pre></td></tr></table></figure>
<h3 id="字符串函数"><a href="#字符串函数" class="headerlink" title="字符串函数"></a>字符串函数</h3><figure class="highlight sql"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br></pre></td><td class="code"><pre><code class="hljs sql"><span class="hljs-comment">-- 返回ascii码</span><br><span class="hljs-keyword">SELECT</span> ASCII(<span class="hljs-string">&#x27;abc&#x27;</span>);<br><br><span class="hljs-comment">-- 返回长度 3 6 2</span><br><span class="hljs-keyword">SELECT</span> LENGTH(<span class="hljs-string">&#x27;abc&#x27;</span>),LENGTH(<span class="hljs-string">&#x27;我们&#x27;</span>),<span class="hljs-keyword">CHAR_LENGTH</span>(<span class="hljs-string">&#x27;我们&#x27;</span>);<br><br><span class="hljs-comment">-- 拼接字符串 </span><br><span class="hljs-keyword">SELECT</span> CONCAT(<span class="hljs-string">&#x27;hello&#x27;</span>,<span class="hljs-string">&#x27; world&#x27;</span>);<br><br><span class="hljs-comment">-- 拼接字符串 第一个参数是分隔符 hello-world </span><br><span class="hljs-keyword">SELECT</span> CONCAT_WS(<span class="hljs-string">&#x27;-&#x27;</span>,<span class="hljs-string">&#x27;hello&#x27;</span>,<span class="hljs-string">&#x27;world&#x27;</span>);<br><br><span class="hljs-comment">-- 向字符串中插入字符 haaaaaoworld 从目标字符串中从下标为2开始替换后面3个字符为插入的字符 </span><br><span class="hljs-keyword">SELECT</span> <span class="hljs-keyword">INSERT</span>(<span class="hljs-string">&#x27;helloworld&#x27;</span>,<span class="hljs-number">2</span>,<span class="hljs-number">3</span>,<span class="hljs-string">&#x27;aaaaa&#x27;</span>);<br><br><span class="hljs-comment">-- 替换 hemmo </span><br><span class="hljs-keyword">SELECT</span> REPLACE(<span class="hljs-string">&#x27;hello&#x27;</span>,<span class="hljs-string">&#x27;ll&#x27;</span>,<span class="hljs-string">&#x27;mm&#x27;</span>)<br><br><span class="hljs-comment">-- 大小写 ABC abc </span><br><span class="hljs-keyword">SELECT</span> <span class="hljs-built_in">UPPER</span>(<span class="hljs-string">&#x27;abc&#x27;</span>),<span class="hljs-built_in">LOWER</span>(<span class="hljs-string">&#x27;ABC&#x27;</span>);<br><br><span class="hljs-comment">-- 左右取 </span><br><span class="hljs-keyword">SELECT</span> <span class="hljs-keyword">LEFT</span>(<span class="hljs-string">&#x27;hello&#x27;</span>,<span class="hljs-number">2</span>),<span class="hljs-keyword">RIGHT</span>(<span class="hljs-string">&#x27;hello&#x27;</span>,<span class="hljs-number">3</span>),<span class="hljs-keyword">RIGHT</span>(<span class="hljs-string">&#x27;hello&#x27;</span>,<span class="hljs-number">12</span>);<br><br><span class="hljs-comment">-- Trim 去空格 </span><br><span class="hljs-keyword">SELECT</span> LTRIM(<span class="hljs-string">&#x27; abc&#x27;</span>),RTRIM(<span class="hljs-string">&#x27;abc &#x27;</span>),<span class="hljs-built_in">TRIM</span>(<span class="hljs-string">&#x27; abc &#x27;</span>);<br><br><span class="hljs-comment">-- 重复 </span><br><span class="hljs-keyword">SELECT</span> REPEAT(<span class="hljs-string">&#x27;hello&#x27;</span>,<span class="hljs-number">4</span>);<br><br><span class="hljs-comment">-- 空格 返回n个空格 </span><br><span class="hljs-keyword">SELECT</span> LENGTH(SPACE(<span class="hljs-number">4</span>));<br><br><span class="hljs-comment">-- 截取 el </span><br><span class="hljs-keyword">SELECT</span> SUBSTR(<span class="hljs-string">&#x27;hello&#x27;</span>,<span class="hljs-number">2</span>,<span class="hljs-number">2</span>);<br><br><span class="hljs-comment">-- 首次出现位置 3</span><br><span class="hljs-keyword">SELECT</span> LOCATE(<span class="hljs-string">&#x27;l&#x27;</span>,<span class="hljs-string">&#x27;hello&#x27;</span>);<br></code></pre></td></tr></table></figure>

<h3 id="日期与时间函数"><a href="#日期与时间函数" class="headerlink" title="日期与时间函数"></a>日期与时间函数</h3><figure class="highlight sql"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><code class="hljs sql"><span class="hljs-comment">-- 获取时间,日期 </span><br><span class="hljs-keyword">SELECT</span> CURDATE(),<span class="hljs-built_in">CURRENT_DATE</span>,<span class="hljs-built_in">CURRENT_TIME</span>,NOW(),SYSDATE(),UTC_DATE(),UTC_TIME();<br><br><span class="hljs-comment">-- 时间戳 返回 现在时间的时间戳 返回对于时间戳的时间 </span><br><span class="hljs-keyword">SELECT</span> UNIX_TIMESTAMP(),FROM_UNIXTIME(<span class="hljs-number">1690634352</span>);<br><br><span class="hljs-comment">-- EXTRCAT 函数 返回时间的特定属性 比如 时分秒 日期等</span><br><span class="hljs-keyword">SELECT</span> <span class="hljs-built_in">EXTRACT</span>(<span class="hljs-keyword">SECOND</span> <span class="hljs-keyword">FROM</span> NOW());<br><span class="hljs-keyword">SELECT</span> <span class="hljs-built_in">EXTRACT</span>(<span class="hljs-keyword">MINUTE</span> <span class="hljs-keyword">FROM</span> NOW());<br><span class="hljs-keyword">SELECT</span> <span class="hljs-built_in">EXTRACT</span>(<span class="hljs-keyword">DAY</span> <span class="hljs-keyword">FROM</span> NOW());<br>....<br><br></code></pre></td></tr></table></figure>
<h3 id="流程控制函数"><a href="#流程控制函数" class="headerlink" title="流程控制函数"></a>流程控制函数</h3><figure class="highlight sql"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br></pre></td><td class="code"><pre><code class="hljs sql"><span class="hljs-comment">-- 判断第一个字符串返回是否为true 是就返回第二个值 否则返回第三个值 类似三元运算符 </span><br><span class="hljs-keyword">SELECT</span> IF(<span class="hljs-number">1</span><span class="hljs-operator">&gt;</span><span class="hljs-number">0</span>,<span class="hljs-string">&#x27;hello&#x27;</span>,<span class="hljs-string">&#x27;world&#x27;</span>);<br><br><span class="hljs-comment">-- 第一个参数为null 返回第二个参数 </span><br><span class="hljs-keyword">SELECT</span> IFNULL(<span class="hljs-keyword">NULL</span>,<span class="hljs-string">&#x27;test&#x27;</span>);<br><span class="hljs-comment">-- 第一种 </span><br><span class="hljs-keyword">SELECT</span> last_name,salary,<span class="hljs-keyword">CASE</span> <span class="hljs-keyword">WHEN</span> salary<span class="hljs-operator">&gt;=</span><span class="hljs-number">15000</span> <span class="hljs-keyword">THEN</span><span class="hljs-string">&#x27;高薪&#x27;</span><br><span class="hljs-keyword">WHEN</span> salary<span class="hljs-operator">&gt;=</span><span class="hljs-number">10000</span> <span class="hljs-keyword">THEN</span> <span class="hljs-string">&#x27;中薪&#x27;</span><br><span class="hljs-keyword">WHEN</span> salary<span class="hljs-operator">&gt;=</span><span class="hljs-number">8000</span> <span class="hljs-keyword">THEN</span> <span class="hljs-string">&#x27;低薪&#x27;</span><br><span class="hljs-keyword">ELSE</span> <span class="hljs-string">&#x27;垃圾&#x27;</span> <span class="hljs-keyword">END</span> &quot;薪资水平&quot;<br><span class="hljs-keyword">FROM</span> employees;<br><span class="hljs-comment">-- 第二种 </span><br><span class="hljs-keyword">SELECT</span> employee_id,last_name,department_id,salary,<span class="hljs-keyword">CASE</span> department_id<br>	<span class="hljs-keyword">WHEN</span> <span class="hljs-number">10</span> <span class="hljs-keyword">THEN</span><br>    salary <span class="hljs-operator">*</span> <span class="hljs-number">1.1</span><br>  <span class="hljs-keyword">WHEN</span> <span class="hljs-number">20</span> <span class="hljs-keyword">THEN</span><br>    salary <span class="hljs-operator">*</span> <span class="hljs-number">1.2</span><br>	<span class="hljs-keyword">WHEN</span> <span class="hljs-number">30</span> <span class="hljs-keyword">THEN</span><br>    salary <span class="hljs-operator">*</span> <span class="hljs-number">1.3</span><br>	<span class="hljs-keyword">ELSE</span><br>		salary <span class="hljs-operator">*</span> <span class="hljs-number">1.4</span><br><span class="hljs-keyword">END</span> &quot;details&quot; <span class="hljs-keyword">FROM</span> employees;<br><br></code></pre></td></tr></table></figure>
<h3 id="加密与解密"><a href="#加密与解密" class="headerlink" title="加密与解密"></a>加密与解密</h3><figure class="highlight sql"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><code class="hljs sql"><span class="hljs-comment">-- 加密函数 8.0已经弃用 </span><br><span class="hljs-keyword">SELECT</span> PASSWORD(<span class="hljs-string">&#x27;mysql&#x27;</span>);<br><br><span class="hljs-comment">-- MD5 sha 不可逆 </span><br><span class="hljs-keyword">SELECT</span> MD5(<span class="hljs-string">&#x27;mysql&#x27;</span>), SHA(<span class="hljs-string">&#x27;mysql&#x27;</span>);<br><br></code></pre></td></tr></table></figure>
