        <figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br><span class="line">100</span><br><span class="line">101</span><br><span class="line">102</span><br><span class="line">103</span><br><span class="line">104</span><br><span class="line">105</span><br><span class="line">106</span><br><span class="line">107</span><br><span class="line">108</span><br><span class="line">109</span><br><span class="line">110</span><br><span class="line">111</span><br><span class="line">112</span><br><span class="line">113</span><br></pre></td><td class="code"><pre><span class="line">/** 基本函数</span><br><span class="line">**/</span><br><span class="line">-- 绝对值</span><br><span class="line">SELECT ABS(-1);</span><br><span class="line">-- 取符号 正数为1 负数为-1</span><br><span class="line">SELECT SIGN(-2),SIGN(2); </span><br><span class="line">-- 圆周率 小数后6位</span><br><span class="line">SELECT PI();  </span><br><span class="line">-- 天花板 &amp;&amp; 地板(向上取整或向下取整) 33 32</span><br><span class="line">SELECT CEIL(32.22),FLOOR(32.22);</span><br><span class="line">-- 取余</span><br><span class="line">SELECT MOD(13,5);</span><br><span class="line">-- 随机数 0-1 随机的一个数</span><br><span class="line">SELECT RAND();</span><br><span class="line">-- 有参数 且相同的参数出来的值是一样的 </span><br><span class="line">SELECT RAND(10);</span><br><span class="line">-- 四舍五入 3 123.5 参数为保留几个小数</span><br><span class="line">SELECT ROUND(3.2), ROUND(123.46,1);</span><br><span class="line">-- 截断函数 保留几个小数 123.2</span><br><span class="line">SELECT TRUNCATE(123.253,1);</span><br><span class="line">-- 进制转换 10的二进制 和 16进制 </span><br><span class="line">SELECT BIN(10),HEX(10); </span><br><span class="line"></span><br><span class="line">/**</span><br><span class="line">字符串函数 </span><br><span class="line">**/</span><br><span class="line">-- 返回ascii码</span><br><span class="line">SELECT ASCII(&#x27;abc&#x27;);</span><br><span class="line">-- 返回长度 3 6 2</span><br><span class="line">SELECT LENGTH(&#x27;abc&#x27;),LENGTH(&#x27;我们&#x27;),CHAR_LENGTH(&#x27;我们&#x27;);</span><br><span class="line">-- 拼接字符串 </span><br><span class="line">SELECT CONCAT(&#x27;hello&#x27;,&#x27; world&#x27;);</span><br><span class="line">-- 拼接字符串 第一个参数是分隔符 hello-world </span><br><span class="line">SELECT CONCAT_WS(&#x27;-&#x27;,&#x27;hello&#x27;,&#x27;world&#x27;);</span><br><span class="line">-- 向字符串中插入字符 haaaaaoworld 从目标字符串中从下标为2开始替换后面3个字符为插入的字符 </span><br><span class="line">SELECT INSERT(&#x27;helloworld&#x27;,2,3,&#x27;aaaaa&#x27;);</span><br><span class="line">-- 替换 hemmo </span><br><span class="line">SELECT REPLACE(&#x27;hello&#x27;,&#x27;ll&#x27;,&#x27;mm&#x27;)</span><br><span class="line">-- 大小写 ABC abc </span><br><span class="line">SELECT UPPER(&#x27;abc&#x27;),LOWER(&#x27;ABC&#x27;);</span><br><span class="line">-- 左右取 </span><br><span class="line">SELECT LEFT(&#x27;hello&#x27;,2),RIGHT(&#x27;hello&#x27;,3),RIGHT(&#x27;hello&#x27;,12);</span><br><span class="line">-- Trim 去空格 </span><br><span class="line">SELECT LTRIM(&#x27; abc&#x27;),RTRIM(&#x27;abc &#x27;),TRIM(&#x27; abc &#x27;);</span><br><span class="line">-- 重复 </span><br><span class="line">SELECT REPEAT(&#x27;hello&#x27;,4);</span><br><span class="line">-- 空格 返回n个空格 </span><br><span class="line">SELECT LENGTH(SPACE(4));</span><br><span class="line">-- 截取 el </span><br><span class="line">SELECT SUBSTR(&#x27;hello&#x27;,2,2);</span><br><span class="line">-- 首次出现位置 3</span><br><span class="line">SELECT LOCATE(&#x27;l&#x27;,&#x27;hello&#x27;);</span><br><span class="line"></span><br><span class="line">/**</span><br><span class="line">日期与时间函数 </span><br><span class="line">**/</span><br><span class="line"></span><br><span class="line">-- 获取时间,日期 </span><br><span class="line">SELECT CURDATE(),CURRENT_DATE,CURRENT_TIME,NOW(),SYSDATE(),UTC_DATE(),UTC_TIME();</span><br><span class="line">-- 时间戳 返回 现在时间的时间戳 返回对于时间戳的时间 </span><br><span class="line">SELECT UNIX_TIMESTAMP(),FROM_UNIXTIME(1690634352);</span><br><span class="line">-- EXTRCAT 函数 返回时间的特定属性 比如 时分秒 日期等</span><br><span class="line">SELECT EXTRACT(SECOND FROM NOW());</span><br><span class="line">SELECT EXTRACT(MINUTE FROM NOW());</span><br><span class="line">SELECT EXTRACT(DAY FROM NOW());</span><br><span class="line">....</span><br><span class="line"></span><br><span class="line">/**</span><br><span class="line">流程控制函数 </span><br><span class="line">**/</span><br><span class="line"></span><br><span class="line">-- 判断第一个字符串返回是否为true 是就返回第二个值 否则返回第三个值 类似三元运算符 </span><br><span class="line">SELECT IF(1&gt;0,&#x27;hello&#x27;,&#x27;world&#x27;);</span><br><span class="line">-- 第一个参数为null 返回第二个参数 </span><br><span class="line">SELECT IFNULL(NULL,&#x27;test&#x27;);</span><br><span class="line">-- 第一种 </span><br><span class="line">SELECT last_name,salary,CASE WHEN salary&gt;=15000 THEN&#x27;高薪&#x27;</span><br><span class="line">WHEN salary&gt;=10000 THEN &#x27;中薪&#x27;</span><br><span class="line">WHEN salary&gt;=8000 THEN &#x27;低薪&#x27;</span><br><span class="line">ELSE &#x27;垃圾&#x27; END &quot;薪资水平&quot;</span><br><span class="line">FROM employees;</span><br><span class="line">-- 第二种 </span><br><span class="line">SELECT employee_id,last_name,department_id,salary,CASE department_id</span><br><span class="line">	WHEN 10 THEN</span><br><span class="line">    salary * 1.1</span><br><span class="line">  WHEN 20 THEN</span><br><span class="line">    salary * 1.2</span><br><span class="line">	WHEN 30 THEN</span><br><span class="line">    salary * 1.3</span><br><span class="line">	ELSE</span><br><span class="line">		salary * 1.4</span><br><span class="line">END &quot;details&quot; FROM employees;</span><br><span class="line"></span><br><span class="line">/**</span><br><span class="line">加密与解密 </span><br><span class="line">**/</span><br><span class="line">-- 加密函数 8.0已经弃用 </span><br><span class="line">SELECT PASSWORD(&#x27;mysql&#x27;);</span><br><span class="line">-- MD5 sha 不可逆 </span><br><span class="line">SELECT MD5(&#x27;mysql&#x27;), SHA(&#x27;mysql&#x27;);</span><br><span class="line"></span><br><span class="line">/**</span><br><span class="line">mysql 信息函数  </span><br><span class="line">**/</span><br><span class="line">-- mysql 版本 </span><br><span class="line">SELECT VERSION();</span><br><span class="line">-- 返回mysql服务器连接数 </span><br><span class="line">SELECT CONNECTION_ID();</span><br><span class="line">-- mysql 命令行所在的数据库 </span><br><span class="line">SELECT DATABASE(),SCHEMA();</span><br><span class="line"></span><br><span class="line">SELECT USER(),CURRENT_USER(),SYSTEM_USER(),SESSION_USER(),CHARSET(&#x27;abc&#x27;),COLLATION(&#x27;abc&#x27;);</span><br><span class="line"></span><br></pre></td></tr></table></figure>
