pan class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br><span class="line">100</span><br><span class="line">101</span><br><span class="line">102</span><br><span class="line">103</span><br><span class="line">104</span><br><span class="line">105</span><br><span class="line">106</span><br><span class="line">107</span><br><span class="line">108</span><br><span class="line">109</span><br><span class="line">110</span><br><span class="line">111</span><br><span class="line">112</span><br><span class="line">113</span><br></pre></td><td class="code"><pre><code class="hljs mysql">/** 基本函数<br>**/<br>-- 绝对值<br>SELECT ABS(-1);<br>-- 取符号 正数为1 负数为-1<br>SELECT SIGN(-2),SIGN(2); <br>-- 圆周率 小数后6位<br>SELECT PI();  <br>-- 天花板 &amp;&amp; 地板(向上取整或向下取整) 33 32<br>SELECT CEIL(32.22),FLOOR(32.22);<br>-- 取余<br>SELECT MOD(13,5);<br>-- 随机数 0-1 随机的一个数<br>SELECT RAND();<br>-- 有参数 且相同的参数出来的值是一样的 <br>SELECT RAND(10);<br>-- 四舍五入 3 123.5 参数为保留几个小数<br>SELECT ROUND(3.2), ROUND(123.46,1);<br>-- 截断函数 保留几个小数 123.2<br>SELECT TRUNCATE(123.253,1);<br>-- 进制转换 10的二进制 和 16进制 <br>SELECT BIN(10),HEX(10); <br><br>/**<br>字符串函数 <br>**/<br>-- 返回ascii码<br>SELECT ASCII(&#x27;abc&#x27;);<br>-- 返回长度 3 6 2<br>SELECT LENGTH(&#x27;abc&#x27;),LENGTH(&#x27;我们&#x27;),CHAR_LENGTH(&#x27;我们&#x27;);<br>-- 拼接字符串 <br>SELECT CONCAT(&#x27;hello&#x27;,&#x27; world&#x27;);<br>-- 拼接字符串 第一个参数是分隔符 hello-world <br>SELECT CONCAT_WS(&#x27;-&#x27;,&#x27;hello&#x27;,&#x27;world&#x27;);<br>-- 向字符串中插入字符 haaaaaoworld 从目标字符串中从下标为2开始替换后面3个字符为插入的字符 <br>SELECT INSERT(&#x27;helloworld&#x27;,2,3,&#x27;aaaaa&#x27;);<br>-- 替换 hemmo <br>SELECT REPLACE(&#x27;hello&#x27;,&#x27;ll&#x27;,&#x27;mm&#x27;)<br>-- 大小写 ABC abc <br>SELECT UPPER(&#x27;abc&#x27;),LOWER(&#x27;ABC&#x27;);<br>-- 左右取 <br>SELECT LEFT(&#x27;hello&#x27;,2),RIGHT(&#x27;hello&#x27;,3),RIGHT(&#x27;hello&#x27;,12);<br>-- Trim 去空格 <br>SELECT LTRIM(&#x27; abc&#x27;),RTRIM(&#x27;abc &#x27;),TRIM(&#x27; abc &#x27;);<br>-- 重复 <br>SELECT REPEAT(&#x27;hello&#x27;,4);<br>-- 空格 返回n个空格 <br>SELECT LENGTH(SPACE(4));<br>-- 截取 el <br>SELECT SUBSTR(&#x27;hello&#x27;,2,2);<br>-- 首次出现位置 3<br>SELECT LOCATE(&#x27;l&#x27;,&#x27;hello&#x27;);<br><br>/**<br>日期与时间函数 <br>**/<br><br>-- 获取时间,日期 <br>SELECT CURDATE(),CURRENT_DATE,CURRENT_TIME,NOW(),SYSDATE(),UTC_DATE(),UTC_TIME();<br>-- 时间戳 返回 现在时间的时间戳 返回对于时间戳的时间 <br>SELECT UNIX_TIMESTAMP(),FROM_UNIXTIME(1690634352);<br>-- EXTRCAT 函数 返回时间的特定属性 比如 时分秒 日期等<br>SELECT EXTRACT(SECOND FROM NOW());<br>SELECT EXTRACT(MINUTE FROM NOW());<br>SELECT EXTRACT(DAY FROM NOW());<br>....<br><br>/**<br>流程控制函数 <br>**/<br><br>-- 判断第一个字符串返回是否为true 是就返回第二个值 否则返回第三个值 类似三元运算符 <br>SELECT IF(1&gt;0,&#x27;hello&#x27;,&#x27;world&#x27;);<br>-- 第一个参数为null 返回第二个参数 <br>SELECT IFNULL(NULL,&#x27;test&#x27;);<br>-- 第一种 <br>SELECT last_name,salary,CASE WHEN salary&gt;=15000 THEN&#x27;高薪&#x27;<br>WHEN salary&gt;=10000 THEN &#x27;中薪&#x27;<br>WHEN salary&gt;=8000 THEN &#x27;低薪&#x27;<br>ELSE &#x27;垃圾&#x27; END &quot;薪资水平&quot;<br>FROM employees;<br>-- 第二种 <br>SELECT employee_id,last_name,department_id,salary,CASE department_id<br>	WHEN 10 THEN<br>    salary * 1.1<br>  WHEN 20 THEN<br>    salary * 1.2<br>	WHEN 30 THEN<br>    salary * 1.3<br>	ELSE<br>		salary * 1.4<br>END &quot;details&quot; FROM employees;<br><br>/**<br>加密与解密 <br>**/<br>-- 加密函数 8.0已经弃用 <br>SELECT PASSWORD(&#x27;mysql&#x27;);<br>-- MD5 sha 不可逆 <br>SELECT MD5(&#x27;mysql&#x27;), SHA(&#x27;mysql&#x27;);<br><br>/**<br>mysql 信息函数  <br>**/<br>-- mysql 版本 <br>SELECT VERSION();<br>-- 返回mysql服务器连接数 <br>SELECT CONNECTION_ID();<br>-- mysql 命令行所在的数据库 <br>SELECT DATABASE(),SCHEMA();<br><br>SELECT USER(),CURRENT_USER(),SYSTEM_USER(),SESSION_USER(),CHARSET(&#x27;abc&#x27;),COLLATION(&#x27;abc&#x27;);<br><br></code></pre></td></tr></table></figure>

    var boardCtn = jQuery('#board-ctn');
    var boardTop = boardCtn.offset().top;

    window.tocbot.init(Object.assign({
      tocSelector     : '#toc-body',
      contentSelector : '.markdown-body',
      linkClass       : 'tocbot-link',
      activeLinkClass : 'tocbot-active-link',
      listClass       : 'tocbot-list',
      isCollapsedClass: 'tocbot-is-collapsed',
      collapsibleClass: 'tocbot-is-collapsible',
      scrollSmooth    : true,
      includeTitleTags: true,
      headingsOffset  : -boardTop,
    }, CONFIG.toc));
    if (toc.find('.toc-list-item').length > 0) {
      toc.css('visibility', 'visible');
    }

    Fluid.events.registerRefreshCallback(function() {
      if ('tocbot' in window) {
        tocbot.refresh();
        var toc = jQuery('#toc');
        if (toc.length === 0 || !tocbot) {
          return;
        }
        if (toc.find('.toc-list-item').length > 0) {
          toc.css('visibility', 'visible');
        }
      }
    });
  });
</script>

    var el = (CONFIG.anchorjs.element || 'h1,h2,h3,h4,h5,h6').split(',');

    for (var item of el) {
      res.push('.markdown-body > ' + item.trim());
    }
    if (CONFIG.anchorjs.placement === 'left') {
      window.anchors.options.class = 'anchorjs-link-left';
    }
    window.anchors.add(res.join(', '));

    Fluid.events.registerRefreshCallback(function() {
      if ('anchors' in window) {
        anchors.removeAll();
        var el = (CONFIG.anchorjs.element || 'h1,h2,h3,h4,h5,h6').split(',');
        var res = [];
        for (var item of el) {
          res.push('.markdown-body > ' + item.trim());
        }
        if (CONFIG.anchorjs.placement === 'left') {
          anchors.options.class = 'anchorjs-link-left';
        }
        anchors.add(res.join(', '));
      }
    });
  });
</script>
